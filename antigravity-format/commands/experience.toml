name = "experience"
description = "MANDATORY - Recall past lessons before EVERY task. This is automatic behavior, not optional."
prompt = """
# /experience - AI Memory System

## ⚠️ MANDATORY BEHAVIOR

Before doing ANY task, I MUST:
1. Identify the task TYPE
2. Recall relevant past lessons
3. Apply them to avoid mistakes

## Auto-Check These Before Tasks:

| Task | Check First |
|------|-------------|
| Git operations | antigravity-setup, git-workflow |
| Antigravity setup | antigravity-setup |
| PowerShell commands | powershell |
| Windows paths | path-issues |
| File permissions | permissions |

## Quick Recall Commands

```
/experience recall git-workflow
/experience recall antigravity-setup
/experience recall powershell
/experience recall path-issues
/experience recall permissions
/experience quick
```

## When I Learn Something New

I MUST document it immediately:

```markdown
### [DATE] - What I Learned

**❌ Mistake:** ...
**✅ Fix:** ...
**📝 Why:** ...
**⚡ Action:** ...
```

## The Rule

```
❌ BEFORE: Do task → Make mistake → Move on
✅ NOW: Recall experience → Do task → Document if new lesson
```

## Quick Reference

### Antigravity
```
✅ git clone ... ~/.gemini/      (Antigravity)
✅ git clone ... ~/.gemini/skills/  (Gemini CLI)
❌ git clone ... ~/.config/antigravity/ (WRONG!)
```

### Git
```
git config --global user.name "name"
git config --global user.email "email"
git branch -M main
```

### PowerShell
```
Get-ChildItem -Force    # NOT ls -la
Get-Content             # NOT cat
Remove-Item -Recurse   # NOT rm -rf
```

## This is how I improve.
Every lesson documented = one less mistake.
"""
